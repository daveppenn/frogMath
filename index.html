<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Frog Hop Math! (Multiple Choice)</title>
  <style>
    :root{
      --bg:#e9fff2;
      --panel:#ffffffcc;
      --ink:#163a2b;
      --accent:#2dd36f;
      --danger:#ff4d4d;
    }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg,#c8f1ff, var(--bg));
      color:var(--ink);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }
    .wrap{
      width:min(980px, 96vw);
      display:grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap:14px;
      align-items:stretch;
    }
    canvas{
      width:100%;
      height:auto;
      background: #b8f7c7;
      border-radius:18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.12);
      border: 2px solid rgba(0,0,0,.08);
    }
    .panel{
      background: var(--panel);
      border-radius:18px;
      padding:14px;
      box-shadow: 0 12px 30px rgba(0,0,0,.10);
      border: 2px solid rgba(0,0,0,.06);
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    h1{ margin:0; font-size:22px; display:flex; align-items:center; gap:8px; }
    .sub{ font-size:13px; opacity:.85; margin-top:-6px; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }

    .seg{
      display:flex;
      background:#ffffff;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.12);
      overflow:hidden;
    }
    .seg label{ cursor:pointer; user-select:none; white-space:nowrap; }
    .seg input{ display:none; }
    .seg span{
      display:inline-block;
      padding:8px 10px;
      font-size:13px;
    }
    .seg input:checked + span{
      background: var(--accent);
      color: #08301f;
      font-weight:800;
    }

    .qBox{
      background:#fff;
      border-radius:16px;
      padding:12px;
      border:1px solid rgba(0,0,0,.10);
    }
    .question{
      font-size:26px;
      font-weight:900;
      letter-spacing:.2px;
    }

    .choices{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    button.choice{
      font-size:18px;
      padding:12px 10px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.16);
      background:#fff;
      cursor:pointer;
      font-weight:900;
      box-shadow: 0 6px 0 rgba(0,0,0,.10);
    }
    button.choice:active{ transform: translateY(2px); box-shadow: 0 4px 0 rgba(0,0,0,.10); }
    button.choice.good{
      border-color: rgba(45,211,111,.9);
      background: rgba(45,211,111,.16);
    }
    button.choice.bad{
      border-color: rgba(255,77,77,.9);
      background: rgba(255,77,77,.16);
    }

    button{
      font-size:15px;
      padding:10px 12px;
      border-radius:12px;
      border:0;
      background: var(--accent);
      color:#0b2f21;
      font-weight:900;
